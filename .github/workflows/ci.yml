name: CI

# Triggered on PRs against main, direct pushes to main, and manual dispatch.
# The push-to-main trigger catches commits that land outside of a tag release
# (doc updates, hotfixes, etc.) and gives early signal before the next tag.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'wiki/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/wiki-sync.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'wiki/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: cmake + msbuild (windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        # The minhook submodule declares cmake_minimum_required(2.8.12) which
        # CMake 4.x rejects. -DCMAKE_POLICY_VERSION_MINIMUM=3.5 lets us configure
        # without forking. -Wno-dev silences developer-mode warnings from minhook.
        run: cmake -G "Visual Studio 17 2022" -A x64 -B build -S . -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -Wno-dev

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        shell: pwsh
        run: |
          $exe = "build/artifacts/Release/spacecal_tests.exe"
          if (-not (Test-Path $exe)) { throw "Test binary not found at $exe" }
          & $exe --gtest_brief=1
          if ($LASTEXITCODE -ne 0) { throw "Tests failed (exit $LASTEXITCODE)" }

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          foreach ($name in @("OpenVR-Pair.exe", "driver_openvrpair.dll")) {
              $src = "build/artifacts/Release/$name"
              if (Test-Path $src) {
                  Copy-Item -Path $src -Destination $stage
              } else {
                  Write-Host "::warning::$name not found at $src. Skipping."
              }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pairdriver-${{ github.sha }}
          path: stage
          if-no-files-found: ignore
          retention-days: 14
